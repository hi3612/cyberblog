<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-outer" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#060608"/>

  <!-- Outer hex ring -->
  <polygon points="50,12 83,31 83,69 50,88 17,69 17,31" fill="none" stroke="#00ff41" stroke-width="1.5" filter="url(#glow-outer)" opacity="0.4"/>

  <!-- Inner hex ring -->
  <polygon points="50,22 76,35 76,65 50,78 24,65 24,35" fill="none" stroke="#00ff41" stroke-width="2" filter="url(#glow)" opacity="0.7"/>

  <!-- Glitch lines -->
  <line x1="15" y1="20" x2="40" y2="20" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" filter="url(#glow)"/>
  <line x1="60" y1="18" x2="85" y2="18" stroke="#ff00ff" stroke-width="0.8" opacity="0.3" filter="url(#glow)"/>
  <line x1="10" y1="80" x2="35" y2="80" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" filter="url(#glow)"/>
  <line x1="65" y1="82" x2="90" y2="82" stroke="#ff00ff" stroke-width="0.8" opacity="0.3" filter="url(#glow)"/>

  <!-- CB text / terminal cursor -->
  <text x="50" y="55" font-family="Consolas,monospace" font-size="28" font-weight="bold" fill="#00ff41" text-anchor="middle" filter="url(#glow)">CB</text>

  <!-- Terminal prompt -->
  <text x="50" y="70" font-family="Consolas,monospace" font-size="7" fill="#ff00ff" text-anchor="middle" opacity="0.5">&gt;_</text>

  <!-- Corner dots -->
  <circle cx="12" cy="12" r="2" fill="#00ff41" filter="url(#glow)"/>
  <circle cx="88" cy="12" r="2" fill="#00ff41" filter="url(#glow)"/>
  <circle cx="12" cy="88" r="2" fill="#00ff41" filter="url(#glow)"/>
  <circle cx="88" cy="88" r="2" fill="#00ff41" filter="url(#glow)"/>
</svg>
